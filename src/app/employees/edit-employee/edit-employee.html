<div class="page-container">

  <div class="form-card">

    <div class="form-header">
      <lib-button 
        label="← Back" variant="secondary" 
        size="sm" type="button" styleType="filled"
        (click)="goBack()">
      </lib-button>

      <h2>Update Employee</h2>
    </div>

    <div class="form-container">
      <form [formGroup]="empForm"  (ngSubmit)="onUpdate()" class="employee-grid">
        
        <lib-text-field
          label="First Name"
          [control]="firstNameControl"
          [isRequired]="true">
        </lib-text-field>

        <lib-text-field
          label="Last Name"
          [control]="lastNameControl"
          [isRequired]="true">
        </lib-text-field>

        <lib-text-field
          label="Email"
          type="email"
          [control]="emailControl"
          [isRequired]="true">
        </lib-text-field>

        <lib-text-field
          label="Phone Number"
          type="text"
          [control]="phoneControl"
          [isRequired]="true">
        </lib-text-field>

        <lib-text-field
          label="Date of Birth"
          variant="datepicker"
          [control]="dobControl"
          [isRequired]="true">
        </lib-text-field>

        <lib-text-field
          label="Joined Date"
          variant="datepicker"
          [control]="joinedDateControl"
          [isRequired]="true">
        </lib-text-field>

        <div class="full-width error-msg" *ngIf="empForm.hasError('dateMismatch') && empForm.get('joinedDate')?.touched">
          Joined Date must be after the Date of Birth.
        </div>

        <div class="radio-group">
          <label class="group-label">Gender *</label>
          <div class="options">
            <label><input type="radio" value="Male" formControlName="gender"> Male</label>
            <label><input type="radio" value="Female" formControlName="gender"> Female</label>
          </div>
          <small class="error" *ngIf="empForm.get('gender')?.touched && empForm.get('gender')?.invalid">
            Gender is required
          </small>
        </div>

        <lib-button 
          label="Update" 
          variant="primary" 
          size='md' 
          type="submit" 
          styleType="filled"
          [disabled]="empForm.invalid" 
          >
        </lib-button>

      </form>

    </div>

  </div>

</div>
