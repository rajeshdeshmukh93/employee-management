
<lib-button
  label="Add Emp"
  variant="primary"
  size='md'
  type="button"
  styleType="filled"
  (click)="addEmployee()">
  
</lib-button>

<table>

    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    <tr *ngFor="let emp of employees">

        <td>{{emp.firstName}}</td>
        <td>{{emp.lastName}}</td>
        <td>{{emp.email}}</td>

        <td>

            <lib-button 
                label="Edit" variant="primary" 
                size='sm'  styleType="filled" type="submit" 
                (click)="editEmployee(emp.id)">
            </lib-button>&nbsp;

            <lib-button label="Delete" variant="primary" 
                size='sm' styleType="filled" type="submit">
            </lib-button>

        </td>

    </tr>

</table>
