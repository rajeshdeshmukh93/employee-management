<div class="page-container">

  <div class="card">

    <!-- Top Bar -->
    <div class="top-bar">
      <h2>Employee List</h2>

      <div class="top-actions">
        <lib-button
          label="Add Emp"
          variant="primary"
          size="md"
          type="button"
          styleType="filled"
          (click)="addEmployee()">
        </lib-button>

        <lib-button
          label="Logout"
          variant="secondary"
          size="md"
          type="button"
          styleType="filled">
        </lib-button>
      </div>
    </div>

    <!-- Table -->
    <table class="emp-table">

      <thead>
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Email</th>
          <th class="action-col">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let emp of employees">

          <td>{{emp.firstName}}</td>
          <td>{{emp.lastName}}</td>
          <td>{{emp.email}}</td>

          <td class="actions">

            <lib-button 
              label="Edit"
              variant="primary"
              size="sm"
              styleType="filled"
              type="button"
              (click)="editEmployee(emp.id)">
            </lib-button>

            <lib-button 
              label="Delete"
              variant="primary"
              size="sm"
              styleType="filled"
              type="button">
            </lib-button>

          </td>

        </tr>
      </tbody>

    </table>

  </div>

</div>
