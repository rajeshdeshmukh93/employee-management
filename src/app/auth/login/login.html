<!-- Using ControlValueAccessor  -->

<form [formGroup]="loginForm">

  <lib-text-field
    label="Email"
    type="email"
    formControlName="email">
  </lib-text-field>

  <lib-text-field
    label="Password"
    type="password"
    formControlName="password">
  </lib-text-field>

  <lib-button 
      label="Login" variant="primary" 
      size='md' type="submit" styleType="filled"
      [disabled]="loginForm.invalid" 
      (click)="onLogin()">
  </lib-button>

</form>
