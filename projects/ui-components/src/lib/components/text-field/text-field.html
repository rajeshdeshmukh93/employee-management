<!-- Using ControlValueAccessor  -->
<div class="input-wrapper">

  <div class="input-container">

    <!-- Input -->
    <input
      *ngIf="type !== 'dropdown'"
      [type]="type"
      [value]="value"
      [disabled]="isDisabled"
      (input)="onInput($event)"
      (blur)="onBlur()"
      placeholder=" "
    />

    <!-- Dropdown -->
    <select
      *ngIf="type === 'dropdown'"
      [value]="value"
      [disabled]="isDisabled"
      (change)="onInput($event)"
      (blur)="onBlur()"
    >
      <option value="" disabled>Select</option>
      <option *ngFor="let opt of options" [value]="opt">
        {{ opt }}
      </option>
    </select>

  </div>

   <div class="error-msg" *ngIf="ngControl?.control?.invalid && ngControl?.control?.touched">
    
      <span *ngIf="ngControl?.control?.errors?.['required']">
        {{ label }} is required
      </span>
    
      <span *ngIf="ngControl?.control?.errors?.['minlength']">
        {{ label }} must be at least required length
      </span>
    
      <span *ngIf="ngControl?.control?.errors?.['maxlength']">
        {{ label }} cannot exceed 10 chars
      </span>
    
      <span *ngIf="ngControl?.control?.errors?.['email']">
        Please enter a valid email address
      </span>
    
      <ng-container *ngIf="ngControl?.control?.errors?.['pattern']">
    
        <span *ngIf="label === 'Password'">
          Min 8 chars, 1 uppercase, 1 lowercase, 1 number
        </span>
    
        <span *ngIf="label === 'Phone Number' || label === 'Phone'">
          Invalid Singapore phone number
        </span>
    
      </ng-container>
    
    </div>
</div>
